<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita - Talleres Casti</title>
    <link rel="shortcut icon" href="img/tools.svg" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />

    <link rel="stylesheet" href="css/breakpoint.css">
    <link rel="stylesheet" href="css/cabecera-footer-style.css">
    <link rel="stylesheet" href="css/citastyle.css">
</head>

<body>
    <header>
        <div class="cabecera-izquierda">
            <a href="index.html" class="text-decoration-none d-flex align-items-center">
                <i class="bi bi-tools logo-cabecera"></i>
                <span class="titulo-pagina">Talleres Casti</span>
            </a>
        </div>
        <nav class="menu-cabecera">
            <a href="tienda.html">Tienda</a>
            <a href="alquiler.html">Alquiler</a>
            <a href="cita.html">Cita</a>
        </nav>
        <div class="cabecera-derecha">
            <i class="bi bi-person-circle cuenta-cabecera"></i>
        </div>
    </header>

    <main class="min-vh-100 py-5">
        <div class="container">
            <form class="mx-auto" style="max-width: 900px;">

                <h1 class="text-center mb-5" style="font: var(--titulo); color: var(--negro-puro);">
                    FORMULARIO DE SOLICITUD
                </h1>

                <div class="border-top border-5 border-dark pt-2 mb-4">
                    <h2 style="font: var(--subtitulo-2); color: var(--negro-puro);">
                        DATOS PERSONALES:
                    </h2>
                </div>

                <div class="row g-4 mb-4 align-items-center">
                    <div class="col-12 col-md-6 d-flex align-items-center">
                        <label class="me-2 text-nowrap"
                            style="font: var(--subtitulo-3); color: var(--negro-puro);">Nombre:</label>
                        <input type="text" class="form-control rounded-0 border-2 border-dark"
                            style="background-color: #eee; font: var(--parrafo);">
                    </div>
                    <div class="col-12 col-md-6 d-flex align-items-center">
                        <label class="me-2 text-nowrap"
                            style="font: var(--subtitulo-3); color: var(--negro-puro);">Correo:</label>
                        <input type="email" class="form-control rounded-0 border-2 border-dark"
                            style="background-color: #eee; font: var(--parrafo);">
                    </div>
                </div>

                <div class="row g-4 mb-5 align-items-center">
                    <div class="col-12 col-md-7 d-flex align-items-center">
                        <label class="me-2 text-nowrap"
                            style="font: var(--subtitulo-3); color: var(--negro-puro);">Teléfono:</label>
                        <input type="tel" class="form-control rounded-0 border-2 border-dark"
                            style="background-color: #eee; font: var(--parrafo);">
                    </div>

                    <div class="col-12 col-md-5 d-flex justify-content-md-end align-items-center">
                        <span class="me-3 fw-bold"
                            style="font: var(--subtitulo-5); line-height: 1.1; text-align: right;">
                            USUARIO<br>REGISTRADO
                        </span>
                        <div class="d-flex align-items-center justify-content-center"
                            style="background-color: var(--negro-puro); width: 50px; height: 50px; border-radius: 12px;">
                            <span class="material-symbols-outlined"
                                style="color: var(--verde-claro); font-size: 35px;">verified</span>
                        </div>
                    </div>
                </div>

                <div class="border-top border-5 border-dark pt-2 mb-4">
                    <h2 style="font: var(--subtitulo-2); color: var(--negro-puro);">
                        DATOS CONSULTA:
                    </h2>
                </div>

                <div class="row g-4 mb-3">
                    <div class="col-12 d-flex align-items-center">
                        <label class="me-2 text-nowrap"
                            style="font: var(--subtitulo-3); color: var(--negro-puro);">Matrícula del vehículo:</label>
                        <input type="text" class="form-control rounded-0 border-2 border-dark"
                            style="background-color: #eee; font: var(--parrafo);">
                    </div>
                </div>

                <div class="row g-4 mb-3">
                    <div class="col-12 d-flex align-items-center">
                        <label class="me-2 text-nowrap" style="font: var(--subtitulo-3); color: var(--negro-puro);">Nº
                            Identificación Vehículo:</label>
                        <input type="text" class="form-control rounded-0 border-2 border-dark"
                            style="background-color: #eee; font: var(--parrafo);">
                    </div>
                </div>

            </form>
        </div>
    </main>

    <footer>
        <p class="footer-descripcion">Teléfono: +34 000 00 00 00</p>
        <p class="footer-descripcion">Email: example@gmail.com</p>
    </footer>

</body>

</html>
